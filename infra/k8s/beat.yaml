apiVersion: apps/v1
kind: Deployment
metadata:
  name: suptc-beat
  namespace: suptc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: suptc-beat
  template:
    metadata:
      labels:
        app: suptc-beat
    spec:
      containers:
        - name: beat
          image: ghcr.io/your-org/suptc-backend:latest
          imagePullPolicy: Always
          command: ["celery", "-A", "app.celery_app.celery_app", "beat", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: suptc-config
            - secretRef:
                name: suptc-secrets
          volumeMounts:
            - name: documents
              mountPath: /tmp/documents
      volumes:
        - name: documents
          emptyDir: {}
