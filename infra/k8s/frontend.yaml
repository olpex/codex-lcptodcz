apiVersion: v1
kind: Service
metadata:
  name: suptc-frontend
  namespace: suptc
spec:
  selector:
    app: suptc-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: suptc-frontend
  namespace: suptc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: suptc-frontend
  template:
    metadata:
      labels:
        app: suptc-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/your-org/suptc-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: suptc-config
